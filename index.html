<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ThisThatGame</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#87CEEB;
    text-align:center;
}

.container{
    max-width:600px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 0 15px gray;
}

h1{
    color:#1565C0;
}

button{
    padding:15px 30px;
    font-size:22px;
    border:none;
    border-radius:15px;
    background:#4CAF50;
    color:white;
    cursor:pointer;
    margin-top:20px;
}

button:hover{
    background:#2E7D32;
}

#game{
    display:none;
}

#picture{
    font-size:90px;
    margin:20px;
}

.choice{
    display:block;
    width:220px;
    margin:10px auto;
}

#score{
    font-size:24px;
    color:#E65100;
}

#result{
    font-size:24px;
    margin-top:20px;
}
</style>

</head>

<body>

<div class="container">

<div id="home">

<h1>🎮 ThisThatGame</h1>

<p>Learn when to use</p>

<h2>This • That • These • Those</h2>

<button onclick="startGame()">▶ Start Game</button>

</div>

<div id="game">

<h2 id="score">Score: 0</h2>

<div id="picture">🍎</div>

<h2 id="question"></h2>

<button class="choice" onclick="checkAnswer('This')">This</button>

<button class="choice" onclick="checkAnswer('That')">That</button>

<button class="choice" onclick="checkAnswer('These')">These</button>

<button class="choice" onclick="checkAnswer('Those')">Those</button>

<p id="result"></p>

</div>

</div>

<script>

const questions = [

{
picture:"🍎",
question:"_____ is an apple.",
answer:"This"
},

{
picture:"🍎🍎🍎",
question:"_____ are apples.",
answer:"These"
},

{
picture:"🚗",
question:"_____ is a car far away.",
answer:"That"
},

{
picture:"🌸🌸",
question:"_____ are flowers.",
answer:"These"
},

{
picture:"✈️✈️",
question:"_____ are airplanes up in the sky.",
answer:"Those"
},

{
picture:"🐱",
question:"_____ is a cat.",
answer:"This"
},

{
picture:"⭐",
question:"_____ is a star in the night sky.",
answer:"That"
},

{
picture:"🏠🏠",
question:"_____ are houses far away.",
answer:"Those"
}

];

let score = 0;
let currentQuestion = 0;

function startGame(){

document.getElementById("home").style.display="none";
document.getElementById("game").style.display="block";

loadQuestion();

}

function loadQuestion(){

let q = questions[currentQuestion];

document.getElementById("picture").innerHTML=q.picture;

document.getElementById("question").innerHTML=q.question;

document.getElementById("result").innerHTML="";

}

function checkAnswer(choice){

if(choice===questions[currentQuestion].answer){

score+=10;

document.getElementById("result").innerHTML="✅ Correct!";

}else{

document.getElementById("result").innerHTML=
"❌ Wrong! The correct answer is <b>"+questions[currentQuestion].answer+"</b>";

}

document.getElementById("score").innerHTML="Score: "+score;

currentQuestion++;

if(currentQuestion<questions.length){

setTimeout(loadQuestion,1200);

}else{

setTimeout(endGame,1200);

}

}

function endGame(){

document.getElementById("game").innerHTML=

"<h1>🎉 Game Over!</h1>"+
"<h2>Your Score: "+score+" / "+(questions.length*10)+"</h2>"+
"<button onclick='location.reload()'>Play Again</button>";

}

</script>

</body>
</html>
